version: '3.8'

services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mbank
      POSTGRES_PASSWORD: mbank_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/create-multiple-databases.sh:/docker-entrypoint-initdb.d/create-multiple-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mbank"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

  # --- Application Services ---
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-jwt-secret-change-in-production
      - AUTH_SERVICE_URL=http://auth-service:3001
      - INVOICE_SERVICE_URL=http://invoice-service:3002
      - PAYMENT_SERVICE_URL=http://payment-service:3003
      - NOTIFICATION_SERVICE_URL=http://notification-service:3004
      - AUDIT_SERVICE_URL=http://audit-service:3005
    depends_on:
      redis:
        condition: service_healthy

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DATABASE_URL=postgresql://mbank:mbank_dev@postgres:5432/auth_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=dev-jwt-secret-change-in-production
      - JWT_EXPIRY=15m
      - REFRESH_TOKEN_EXPIRY=7d
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  invoice-service:
    build:
      context: .
      dockerfile: services/invoice-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - DATABASE_URL=postgresql://mbank:mbank_dev@postgres:5432/invoice_db
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - PORT=3003
      - DATABASE_URL=postgresql://mbank:mbank_dev@postgres:5432/payment_db
      - REDIS_URL=redis://redis:6379
      - INTEGRATION_SERVICE_URL=http://integration-service:3006
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - PORT=3004
      - DATABASE_URL=postgresql://mbank:mbank_dev@postgres:5432/notification_db
      - REDIS_URL=redis://redis:6379
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  audit-service:
    build:
      context: .
      dockerfile: services/audit-service/Dockerfile
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=development
      - PORT=3005
      - DATABASE_URL=postgresql://mbank:mbank_dev@postgres:5432/audit_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  integration-service:
    build:
      context: .
      dockerfile: services/integration-service/Dockerfile
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=development
      - PORT=3006
      - DATABASE_URL=postgresql://mbank:mbank_dev@postgres:5432/integration_db
      - REDIS_URL=redis://redis:6379
      - FINACLE_BASE_URL=http://mock-finacle:3010
      - EINVOICE_BASE_URL=http://mock-einvoice:3011
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  mock-finacle:
    build:
      context: .
      dockerfile: services/mock-finacle/Dockerfile
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=development
      - PORT=3010

  mock-einvoice:
    build:
      context: .
      dockerfile: services/mock-einvoice/Dockerfile
    ports:
      - "3011:3011"
    environment:
      - NODE_ENV=development
      - PORT=3011

  # --- Frontend ---
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000/api
    depends_on:
      - api-gateway
    volumes:
      - ./frontend/src:/app/frontend/src

volumes:
  postgres_data:
  redis_data:
