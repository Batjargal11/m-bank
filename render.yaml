# Render Blueprint - https://render.com/docs/blueprint-spec
services:
  # Backend (Unified Server)
  - type: web
    name: m-bank-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: |
      npm install
      npx tsc --project packages/shared-types/tsconfig.json
      npx tsc --project packages/shared-utils/tsconfig.json
      npx tsc --project packages/shared-middleware/tsconfig.json
      npx tsc --project services/unified-server/tsconfig.json
    startCommand: node services/unified-server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: m-bank-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://m-bank-frontend.onrender.com
    healthCheckPath: /health

  # Frontend (Static Site)
  - type: web
    name: m-bank-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://m-bank-api.onrender.com

databases:
  - name: m-bank-db
    plan: free
    databaseName: mbank
    region: oregon
